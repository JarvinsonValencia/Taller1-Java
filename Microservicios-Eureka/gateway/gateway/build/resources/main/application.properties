
# Puerto del servidor
server.port=8080

# Nombre de la aplicaci�n
spring.application.name=api-gateway

# Gateway - descubrimiento autom�tico con Eureka
spring.cloud.gateway.discovery.locator.enabled=true

# Configuracion cliente Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Definici�n de rutas
spring.cloud.gateway.routes[0].id=flota-route
spring.cloud.gateway.routes[0].uri=lb://FLOTA-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/flota/**

spring.cloud.gateway.routes[1].id=cotizador-route
spring.cloud.gateway.routes[1].uri=lb://COTIZADOR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/cotizaciones/**

spring.cloud.gateway.routes[2].id=vehiculo-route
spring.cloud.gateway.routes[2].uri=lb://VEHICULO-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/vehiculos/**


